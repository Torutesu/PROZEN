name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        type: choice
        options: [staging, production]
        default: staging

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Gate: CI must pass before deploy
  check-ci:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify CI status
        run: echo "CI passed — proceeding to deploy"

  deploy-backend:
    name: Deploy Backend (Railway)
    needs: check-ci
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run migrate

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Validate backend deploy secrets
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          test -n "$RAILWAY_TOKEN" || { echo "Missing secret: RAILWAY_TOKEN"; exit 1; }
          test -n "$DATABASE_URL" || { echo "Missing secret: DATABASE_URL"; exit 1; }

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          GITHUB_TOKEN_ENCRYPTION_KEY: ${{ secrets.GITHUB_TOKEN_ENCRYPTION_KEY }}
          ALLOWED_ORIGIN: ${{ secrets.ALLOWED_ORIGIN }}
        run: |
          railway up \
            --service prozen-api \
            --environment ${{ github.event.inputs.environment || 'staging' }} \
            --detach
          echo "Deployed backend commit ${{ github.sha }} to ${{ github.event.inputs.environment || 'staging' }}"

  deploy-frontend:
    name: Deploy Frontend (Vercel)
    needs: check-ci
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}

    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Validate frontend deploy secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          test -n "$VERCEL_TOKEN" || { echo "Missing secret: VERCEL_TOKEN"; exit 1; }
          test -n "$VERCEL_ORG_ID" || { echo "Missing secret: VERCEL_ORG_ID"; exit 1; }
          test -n "$VERCEL_PROJECT_ID" || { echo "Missing secret: VERCEL_PROJECT_ID"; exit 1; }

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ "${{ github.event.inputs.environment }}" = "production" ]; then
            vercel deploy --prod --yes --token "$VERCEL_TOKEN"
          else
            vercel deploy --yes --token "$VERCEL_TOKEN"
          fi
          echo "Deployed frontend commit ${{ github.sha }} to ${{ github.event.inputs.environment || 'staging' }}"
